<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rainbow IT - Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <img src="https://rainbowthemes.net/wp-content/uploads/2024/05/rbt-logo-icon-1.webp" alt="Rainbow IT Logo" class="logo">
    <span class="nav-title">Rainbow IT - Calc Tool</span>
  </nav>

  <main>
    <div class="calculator">
      <h2>Calculator</h2>
      <input type="number" id="num1" placeholder="First number">
      <select id="operation">
        <option value="add">add</option>
        <option value="subtract">subtract</option>
        <option value="multiply">multiply</option>
        <option value="divide">divide</option>
        <option value="modulo">modulo</option>
      </select>
      <input type="number" id="num2" placeholder="Second number">
      <button id="calc-btn">Calculate</button>
      <div id="result">Result: </div>
    </div>
  </main>

  <footer>
    <p>Built by Rainbow IT - 2026</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
